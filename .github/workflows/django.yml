name: Django DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  stage_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


  stage_lint:
    runs-on: ubuntu-latest
    needs: stage_build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Lint Dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint

      - name: Run Pylint
        continue-on-error: true
        run: |
          pylint $(git ls-files '*.py' | grep -Ev 'migrations|\.c9') || true


  stage_test:
    runs-on: ubuntu-latest
    needs: stage_lint

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Test Dependencies
        run: |
          pip install -r requirements.txt
          pip install coverage

      - name: Run Django Tests
        run: |
          coverage run --source='.' manage.py test
          coverage xml -i

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  stage_sonar_analysis:
    runs-on: ubuntu-latest
    needs: stage_test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Install Java
        run: |
          sudo apt-get update
          sudo apt-get install openjdk-17-jdk -y

      - name: Install Sonar Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          echo "${{ github.workspace }}/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Run SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          sonar-scanner \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.organization=$SONAR_ORG \
            -Dsonar.sources=. \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.exclusions=.c9/**,**/migrations/**,**/__pycache__/**


  stage_deployment:
    runs-on: ubuntu-latest
    needs: stage_sonar_analysis

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create Deployment Package
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "*__pycache__*" \
            -x "*.pyc" \
            -x ".c9/*" \
            -x "coverage.xml" \
            -x ".coverage" \
            -x "sonar-scanner*" \
            -x "*.zip" \
            -x ".pytest_cache/*" \
            -x ".github/*"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: Eb-devops-x25167341
          environment_name: Eb-devops-x25167341-env
          region: us-east-1
          version_label: "build-${{ github.run_number }}"
          deployment_package: deploy.zip
          wait_for_deployment: false